<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Хөхөөр Хоолуулалтын Хяналт — БЗД</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;600;700&display=swap');
:root {
--blue:#1A56DB;--blue-light:#EBF5FF;--blue-mid:#3B82F6;
--green:#059669;--green-light:#ECFDF5;--orange:#D97706;
--red:#DC2626;--purple:#7C3AED;--teal:#0891B2;
--gray-50:#F9FAFB;--gray-100:#F3F4F6;--gray-200:#E5E7EB;
--gray-400:#9CA3AF;--gray-600:#4B5563;--gray-800:#1F2937;
--shadow:0 4px 16px rgba(0,0,0,0.08);--radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans','Segoe UI',sans-serif;background:var(--gray-50);color:var(--gray-800);min-height:100vh}
.screen{display:none;min-height:100vh}
.screen.active{display:block}
#screen-login{background:linear-gradient(160deg,#0F3460 0%,#1A56DB 60%,#3B82F6 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center}
#screen-login.active{display:flex}
.login-logo{width:72px;height:72px;background:rgba(255,255,255,0.15);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:36px;margin-bottom:20px;border:1px solid rgba(255,255,255,0.25)}
.login-title{color:#fff;font-size:22px;font-weight:700;margin-bottom:6px}
.login-sub{color:rgba(255,255,255,0.75);font-size:13px;margin-bottom:36px;line-height:1.6}
.qr-card{background:#fff;border-radius:20px;padding:28px 32px;box-shadow:0 20px 60px rgba(0,0,0,0.25);margin-bottom:28px;max-width:320px;width:100%}
.qr-card-title{font-size:13px;font-weight:600;color:var(--gray-600);margin-bottom:16px;letter-spacing:0.5px;text-transform:uppercase}
#qr-container{display:flex;justify-content:center;margin-bottom:16px}
.qr-hint{font-size:12px;color:var(--gray-400);line-height:1.5}
.divider-or{color:rgba(255,255,255,0.5);font-size:13px;margin:0 0 20px}
.login-form{max-width:320px;width:100%}
.login-form input{width:100%;padding:13px 16px;border-radius:12px;border:2px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.12);color:#fff;font-size:14px;margin-bottom:10px;outline:none;font-family:inherit}
.login-form input::placeholder{color:rgba(255,255,255,0.5)}
.login-form input:focus{border-color:rgba(255,255,255,0.6)}
.btn-login{width:100%;padding:14px;border-radius:12px;border:none;background:#fff;color:var(--blue);font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
.app-header{background:linear-gradient(135deg,#0F3460,#1A56DB);padding:18px 20px 16px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(15,52,96,0.3)}
.header-row{display:flex;align-items:center;justify-content:space-between}
.header-brand{display:flex;align-items:center;gap:10px}
.header-text h1{color:#fff;font-size:15px;font-weight:700}
.header-text p{color:rgba(255,255,255,0.65);font-size:11px;margin-top:1px}
.header-doctor{background:rgba(255,255,255,0.15);border-radius:20px;padding:5px 12px;color:#fff;font-size:12px;font-weight:600;cursor:pointer;border:1px solid rgba(255,255,255,0.2)}
.app-body{padding:16px;max-width:680px;margin:0 auto}
.patient-card{background:#fff;border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:14px}
.card-label{font-size:11px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:10px}
.patient-fields{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.field-group label{font-size:11px;color:var(--gray-400);display:block;margin-bottom:4px;font-weight:600}
.field-group input{width:100%;padding:9px 12px;border:1.5px solid var(--gray-200);border-radius:8px;font-size:13px;outline:none;font-family:inherit;transition:border-color 0.2s}
.field-group input:focus{border-color:var(--blue-mid)}
.visit-section{margin-bottom:14px}
.section-label{font-size:11px;font-weight:700;color:var(--gray-600);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px;padding-left:2px}
.visit-tabs{display:flex;gap:7px;flex-wrap:wrap}
.visit-tab{padding:7px 13px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--gray-200);background:#fff;color:var(--gray-600);transition:all 0.2s;font-family:inherit}
.visit-tab.active{background:var(--blue);border-color:var(--blue);color:#fff;box-shadow:0 3px 10px rgba(26,86,219,0.3)}
.progress-card{background:#fff;border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow);margin-bottom:14px;display:flex;align-items:center;gap:14px}
.cl-section{background:#fff;border-radius:var(--radius);margin-bottom:12px;box-shadow:var(--shadow);overflow:hidden}
.cl-section-header{padding:13px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--gray-100);cursor:pointer;user-select:none}
.cl-section-dot{width:10px;height:10px;border-radius:50%;min-width:10px}
.cl-section-title{font-size:13px;font-weight:700;flex:1}
.cl-section-count{font-size:12px;font-weight:600;padding:2px 8px;border-radius:12px}
.cl-section-arrow{font-size:11px;color:var(--gray-400);transition:transform 0.2s}
.cl-section.collapsed .cl-section-arrow{transform:rotate(-90deg)}
.cl-items{padding:8px 10px 10px}
.cl-section.collapsed .cl-items{display:none}
.cl-item{display:flex;align-items:flex-start;gap:11px;padding:9px 8px;border-radius:8px;cursor:pointer;margin-bottom:4px;transition:background 0.15s;user-select:none}
.cl-item:hover{background:var(--gray-50)}
.cl-checkbox{width:20px;height:20px;min-width:20px;border-radius:5px;border:2px solid var(--gray-200);display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all 0.15s;font-size:11px;color:#fff}
.cl-item-text{font-size:13px;line-height:1.55;color:var(--gray-800)}
.notes-card{background:#fff;border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow);margin-bottom:14px}
.notes-card textarea{width:100%;border:1.5px solid var(--gray-200);border-radius:8px;padding:10px 12px;font-size:13px;resize:vertical;min-height:80px;font-family:inherit;outline:none;margin-top:8px;color:var(--gray-800)}
.action-row{display:flex;gap:10px;margin-bottom:20px}
.btn{flex:1;padding:13px;border-radius:11px;font-size:14px;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:all 0.2s}
.btn-secondary{background:#fff;color:var(--gray-600);border:1.5px solid var(--gray-200)}
.btn-primary{background:linear-gradient(135deg,#1A56DB,#3B82F6);color:#fff;box-shadow:0 4px 14px rgba(26,86,219,0.35)}
.btn-pdf{background:linear-gradient(135deg,#059669,#10B981);color:#fff;box-shadow:0 4px 14px rgba(5,150,105,0.3)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1F2937;color:#fff;padding:12px 20px;border-radius:12px;font-size:13px;font-weight:600;z-index:999;transition:transform 0.3s ease;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,0.3)}
.toast.show{transform:translateX(-50%) translateY(0)}
@media(max-width:480px){.patient-fields{grid-template-columns:1fr}.action-row{flex-direction:column}}
</style>
</head>
<body>
<div id="screen-login" class="screen active">
  <div class="login-logo">🤱</div>
  <div class="login-title">Хөхөөр Хоолуулалтын Хяналт</div>
  <div class="login-sub">Баянзүрх дүүргийн өрхийн эмч нарт<br>ДЭМБ протоколд үндэслэсэн</div>
  <div class="qr-card">
    <div class="qr-card-title">📱 QR кодоор нэвтрэх</div>
    <div id="qr-container"></div>
    <div class="qr-hint">Утсаараа уншуулж нэвтрэх эсвэл доор нэр, нууц үгээ оруулна уу</div>
  </div>
  <div class="divider-or">—
<script>
const VISITS=[{id:'v1',label:'3–7 хоног'},{id:'v2',label:'1 сар'},{id:'v3',label:'2 сар'},{id:'v4',label:'4 сар'},{id:'v5',label:'6 сар'},{id:'v6',label:'9 сар'},{id:'v7',label:'12 сар'}];
const SECTIONS=[
{id:'s1',title:'1. Эхийн бэлтгэл байдал',color:'#2563EB',bg:'#EFF6FF',items:[{id:'e1',text:'Эх хөхүүлэхийг хүсч байгаа эсэх (сайн дурын байдал)'},{id:'e2',text:'Хөхний орчим цэвэр, хуурай байгаа эсэх'},{id:'e3',text:'Хөхний хэлбэр (хавтгай, хонхойсон хөх илэрсэн эсэх)'},{id:'e4',text:'Хөхний хагарал, өвдөлт — зөвлөгөө өгсөн эсэх'},{id:'e5',text:'Эх сүүний хангалттай ялгаралт байгаа эсэх'}]},
{id:'s2',title:'2. Хөхүүлэх байрлал',color:'#059669',bg:'#ECFDF5',items:[{id:'b1',text:'Хүүхдийн толгой, бие, хөл нэг шулуун шугамд байгаа эсэх'},{id:'b2',text:'Хүүхдийн хэвлий эхийн хэвлийд нийлсэн байгаа эсэх'},{id:'b3',text:'Хүүхдийн бие эхийн гар, биеэр дэмжигдсэн байгаа эсэх'},{id:'b4',text:'Хүүхдийн нүүр хөхрүү харсан байгаа эсэх'},{id:'b5',text:'Эхийн нуруу тайван, тулгууртай суусан байгаа эсэх'}]},
{id:'s3',title:'3. Хөх барих (Latch-on)',color:'#D97706',bg:'#FFFBEB',items:[{id:'l1',text:'Хүүхдийн ам өргөн нээгдсэн байгаа эсэх'},{id:'l2',text:'Хүүхэд хөхний толгой болон ареолыг хамт барьсан эсэх'},{id:'l3',text:'Хүүхдийн доод уруул гадагшаа эргэсэн байгаа эсэх'},{id:'l4',text:'Хүүхдийн хамар хөхнөөс чөлөөтэй байгаа эсэх'},{id:'l5',text:'Хөхүүлэх үед эхэд өвдөлт байхгүй байгаа эсэх'}]},
{id:'s4',title:'4. Хөхүүлэх хугацаа, давтамж',color:'#7C3AED',bg:'#F5F3FF',items:[{id:'h1',text:'24 цагт 8–12 удаа хөхүүлж байгаа эсэх'},{id:'h2',text:'Хөхлөгийн хооронд 2–3 цагаас илүүгүй хугацаа өнгөрч байгаа эсэх'},{id:'h3',text:'Нэг удаагийн хөхлөгт 10–20 минутаас доошгүй хөхдөг эсэх'},{id:'h4',text:'Нэг хөхийг сайн хөхсний дараа нөгөөд шилждэг эсэх'},{id:'h5',text:'Шөнийн хөхлөгийг хадгалж байгаа эсэх'}]},
{id:'s5',title:'5. Хооллолтын хүрэлцэл',color:'#0891B2',bg:'#F0FDFA',items:[{id:'k1',text:'Хоолны дараа хүүхэд тайвширч нойрссон байдаг эсэх'},{id:'k2',text:'24 цагт 6-аас доошгүй чийгэн зүгч байдаг эсэх'},{id:'k3',text:'24 цагт 3-аас доошгүй баас гарч байгаа эсэх (эхний сард)'},{id:'k4',text:'Жин хэвийн өсч байгаа эсэх'},{id:'k5',text:'Арьсны тургор хэвийн — дегидратацийн шинж байхгүй'}]},
{id:'s6',title:'6. Эхийн хоол тэжээл',color:'#DC2626',bg:'#FEF2F2',items:[{id:'d1',text:'Өдөрт 8–10 аяга ус уусан эсэх'},{id:'d2',text:'Тэнцвэртэй хоол хүнс хэрэглэж байгаа эсэх'},{id:'d3',text:'Тамхи, архи хэрэглэхгүй байгаа эсэх'},{id:'d4',text:'Гэр бүлийн дэмжлэг байгаа эсэх'},{id:'d5',text:'Сүүний хангалтын талаар зөвлөгөө авсан эсэх'}]},
{id:'s7',title:'7. Нэмэлт хоол (6 сараас)',color:'#BE185D',bg:'#FDF2F8',items:[{id:'n1',text:'6 сар хүрэхээс өмнө нэмэлт хоол өгөөгүй байгаа эсэх'},{id:'n2',text:'Нэмэлт хоол эхлүүлэхэд хөхөөр хооллолт үргэлжилж байгаа эсэх'},{id:'n3',text:'Нэмэлт хоол нэг бүтээгдэхүүнээс эхэлсэн байгаа эсэх'},{id:'n4',text:'2 нас хүртэл хөхүүлэх зорилт тавигдсан эсэх'}]}
];
const TOTAL=SECTIONS.reduce((s,c)=>s+c.items.length,0);
let state={doctor:'',visit:'v1',checked:{},notes:{}};
window.onload=()=>{
  try{new QRCode(document.getElementById('qr-container'),{text:window.location.href,width:160,height:160,colorDark:'#1A56DB',colorLight:'#ffffff'});}catch(e){}
  document.getElementById('p-date').value=new Date().toISOString().split('T')[0];
  buildVisitTabs();buildChecklist();updateProgress();
};
function doLogin(){
  const name=document.getElementById('login-name').value.trim();
  const pass=document.getElementById('login-pass').value;
  if(!name){showToast('⚠ Нэрээ оруулна уу');return;}
  if(pass!=='1234'){showToast('⚠ Нууц үг буруу (demo: 1234)');return;}
  state.doctor=name;
  document.getElementById('doctor-badge').textContent='👤 '+name+' ↩';
  document.getElementById('screen-login').classList.remove('active');
  document.getElementById('screen-app').classList.add('active');
}
function logout(){if(!confirm('Гарах уу?'))return;document.getElementById('screen-app').classList.remove('active');document.getElementById('screen-login').classList.add('active');document.getElementById('login-pass').value='';}
function buildVisitTabs(){
  const cont=document.getElementById('visit-tabs');cont.innerHTML='';
  VISITS.forEach(v=>{const btn=document.createElement('button');btn.className='visit-tab'+(v.id===state.visit?' active':'');btn.textContent=v.label;btn.onclick=()=>switchVisit(v.id);cont.appendChild(btn);});
}
function switchVisit(id){
  state.visit=id;buildVisitTabs();updateProgress();
  document.getElementById('notes-area').value=state.notes[id]||'';
  SECTIONS.forEach(sec=>sec.items.forEach(item=>{
    const key=state.visit+'_'+item.id;const el=document.getElementById('chk-'+item.id);
    if(el){if(state.checked[key]){el.classList.add('checked');el.querySelector('.cl-checkbox').style.background=sec.color;el.querySelector('.cl-checkbox').style.borderColor=sec.color;el.querySelector('.cl-checkbox').textContent='✓';}
    else{el.classList.remove('checked');el.querySelector('.cl-checkbox').style.background='#fff';el.querySelector('.cl-checkbox').style.borderColor='#E5E7EB';el.querySelector('.cl-checkbox').textContent='';}}
  }));
}
function buildChecklist(){
  const cont=document.getElementById('checklist-container');cont.innerHTML='';
  SECTIONS.forEach(sec=>{
    const div=document.createElement('div');div.className='cl-section';div.id='sec-'+sec.id;
    const header=document.createElement('div');header.className='cl-section-header';
    header.innerHTML=`<div class="cl-section-dot" style="background:${sec.color}"></div><div class="cl-section-title">${sec.title}</div><div class="cl-section-count" id="cnt-${sec.id}" style="background:${sec.bg};color:${sec.color}">0/${sec.items.length}</div><div class="cl-section-arrow">▼</div>`;
    header.onclick=()=>div.classList.toggle('collapsed');
    const items=document.createElement('div');items.className='cl-items';
    sec.items.forEach(item=>{
      const row=document.createElement('div');row.className='cl-item';row.id='chk-'+item.id;
      row.innerHTML=`<div class="cl-checkbox" style="background:#fff;border-color:#E5E7EB"></div><div class="cl-item-text">${item.text}</div>`;
      row.onclick=()=>toggleItem(item.id,sec);items.appendChild(row);
    });
    div.appendChild(header);div.appendChild(items);cont.appendChild(div);
  });
}
function toggleItem(itemId,sec){
  const key=state.visit+'_'+itemId;state.checked[key]=!state.checked[key];
  const el=document.getElementById('chk-'+itemId);const box=el.querySelector('.cl-checkbox');
  if(state.checked[key]){el.classList.add('checked');box.style.background=sec.color;box.style.borderColor=sec.color;box.textContent='✓';}
  else{el.classList.remove('checked');box.style.background='#fff';box.style.borderColor='#E5E7EB';box.textContent='';}
  updateProgress();updateSectionCount(sec);
}
function updateSectionCount(sec){const done=sec.items.filter(i=>state.checked[state.visit+'_'+i.id]).length;const el=document.getElementById('cnt-'+sec.id);if(el)el.textContent=done+'/'+sec.items.length;}
function updateProgress(){
  let done=0;
  SECTIONS.forEach(sec=>{let sd=0;sec.items.forEach(i=>{if(state.checked[state.visit+'_'+i.id]){done++;sd++;}});const el=document.getElementById('cnt-'+sec.id);if(el)el.textContent=sd+'/'+sec.items.length;});
  const pct=Math.round(done/TOTAL*100);
  document.getElementById('prog-pct').textContent=pct+'%';
  document.getElementById('prog-sub').textContent=done+' / '+TOTAL+' асуулт тэмдэглэгдсэн';
  const color=pct>=80?'#059669':pct>=50?'#D97706':'#DC2626';
  const label=pct>=80?'✅ Сайн — Хэвийн':pct>=50?'⚠ Зөвлөгөө шаардлагатай':'🔴 Анхаарал шаардлагатай';
  document.getElementById('prog-label').textContent=label;
  document.getElementById('prog-label').style.color=color;
  document.getElementById('prog-pct').style.color=color;
  const circ=document.getElementById('prog-circle');
  circ.style.strokeDashoffset=138.2-(pct/100)*138.2;circ.style.stroke=color;
}
document.addEventListener('DOMContentLoaded',()=>{const ta=document.getElementById('notes-area');if(ta)ta.addEventListener('input',()=>{state.notes[state.visit]=ta.value;});});
function saveVisit(){state.notes[state.visit]=document.getElementById('notes-area').value;showToast('✅ Үзлэг амжилттай хадгалагдлаа!');}
function resetForm(){
  if(!confirm('Шинэ үзлэг эхлүүлэх үү?'))return;
  document.getElementById('p-name').value='';document.getElementById('p-reg').value='';
  document.getElementById('p-age').value='';document.getElementById('p-date').value=new Date().toISOString().split('T')[0];
  state.checked={};state.notes={};state.visit='v1';
  buildVisitTabs();buildChecklist();updateProgress();document.getElementById('notes-area').value='';
  showToast('🔄 Шинэ үзлэг эхэллээ');
}
function exportPDF(){
  const name=document.getElementById('p-name').value||'—';
  const reg=document.getElementById('p-reg').value||'—';
  const age=document.getElementById('p-age').value||'—';
  const date=document.getElementById('p-date').value||'—';
  const visitLabel=VISITS.find(v=>v.id===state.visit)?.label||'—';
  const notes=state.notes[state.visit]||'';
  let done=0;SECTIONS.forEach(sec=>sec.items.forEach(i=>{if(state.checked[state.visit+'_'+i.id])done++;}));
  const pct=Math.round(done/TOTAL*100);
  let html=`<div style="font-family:sans-serif;padding:32px;max-width:680px;margin:0 auto">
  <div style="border-bottom:3px solid #1A56DB;padding-bottom:16px;margin-bottom:20px">
  <div style="font-size:10px;color:#6B7280;text-transform:uppercase;margin-bottom:4px">Баянзүрх дүүргийн өрхийн эмнэлэг</div>
  <div style="font-size:20px;font-weight:800;color:#1A56DB">🤱 Хөхөөр Хоолуулалтын Хяналт</div></div>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px;background:#F3F4F6;border-radius:10px;padding:14px;margin-bottom:20px">
  <div><div style="font-size:10px;color:#6B7280">Эхийн нэр</div><div style="font-weight:700;font-size:13px">${name}</div></div>
  <div><div style="font-size:10px;color:#6B7280">Регистр</div><div style="font-weight:700;font-size:13px">${reg}</div></div>
  <div><div style="font-size:10px;color:#6B7280">Хүүхдийн нас</div><div style="font-weight:700;font-size:13px">${age}</div></div>
  <div><div style="font-size:10px;color:#6B7280">Үзлэг</div><div style="font-weight:700;font-size:13px">${visitLabel}</div></div></div>
  <div style="background:${pct>=80?'#ECFDF5':pct>=50?'#FFFBEB':'#FEF2F2'};border-radius:10px;padding:12px 16px;margin-bottom:20px;display:flex;align-items:center;gap:12px">
  <div style="font-size:28px;font-weight:800;color:${pct>=80?'#059669':pct>=50?'#D97706':'#DC2626'}">${pct}%</div>
  <div><div style="font-weight:700;color:${pct>=80?'#059669':pct>=50?'#D97706':'#DC2626'}">${pct>=80?'✅ Сайн':pct>=50?'⚠ Зөвлөгөө шаардлагатай':'🔴 Анхаарал шаардлагатай'}</div>
  <div style="font-size:12px;color:#6B7280">${done} / ${TOTAL} үзүүлэлт</div></div></div>`;
  SECTIONS.forEach(sec=>{
    html+=`<div style="margin-bottom:14px"><div style="font-size:12px;font-weight:700;color:${sec.color};margin-bottom:6px;border-bottom:1.5px solid ${sec.bg};padding-bottom:4px">${sec.title}</div>`;
    sec.items.forEach(item=>{const chk=state.checked[state.visit+'_'+item.id];
      html+=`<div style="display:flex;align-items:flex-start;gap:8px;padding:5px 0;border-bottom:1px solid #F9FAFB">
      <div style="width:16px;height:16px;min-width:16px;border-radius:4px;border:1.5px solid ${chk?sec.color:'#D1D5DB'};background:${chk?sec.color:'#fff'};display:flex;align-items:center;justify-content:center;margin-top:1px">${chk?'<span style="color:#fff;font-size:10px;font-weight:900">✓</span>':''}</div>
      <div style="font-size:12px;line-height:1.5;color:${chk?'#374151':'#9CA3AF'}">${item.text}</div></div>`;
    });html+='</div>';
  });
  if(notes)html+=`<div style="background:#F3F4F6;border-radius:8px;padding:12px;margin-top:6px"><div style="font-size:10px;font-weight:700;color:#6B7280;margin-bottom:4px">ТЭМДЭГЛЭЛ</div><div style="font-size:12px;line-height:1.6">${notes}</div></div>`;
  html+=`<div style="margin-top:20px;padding-top:12px;border-top:1px solid #E5E7EB;font-size:10px;color:#9CA3AF;text-align:center">ДЭМБ · ЮНИСЕФ протоколд үндэслэсэн | Баянзүрх дүүргийн өрхийн эмнэлэг | ${date}</div></div>`;
  const win=window.open('','_blank','width=720,height=900');
  win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Үзлэг — ${name}</title></head><body style="margin:0;background:#fff">${html}<div style="text-align:center;padding:20px"><button onclick="window.print()" style="padding:10px 28px;background:#1A56DB;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer">🖨 Хэвлэх / PDF хадгалах</button></div></body></html>`);
  win.document.close();
}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
</script>
</body>
</html>
